# Test profile: run the full context against in-memory H2 instead of PostgreSQL,
# and provide a JWT secret so the security beans initialize.
spring:
  datasource:
    url: jdbc:h2:mem:loanhub_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

app:
  jwt:
    secret: test-secret-test-secret-test-secret-0123456789
    expiration-minutes: 60
  cors:
    allowed-origins: http://localhost:3000
